<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Uyut</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html">Uyut<span>.</span></a>
                </div>
                <nav id="main-nav"></nav>
                <div class="header-actions"></div>
            </div>
        </div>
    </header>

    <div class="auth-form">
        <h2>Welcome Back</h2>
        <div id="error-message" class="error-message hidden"></div>
        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Your password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>
        <p class="text-center mt-20">
            Don't have an account? <a href="register.html">Sign up</a>
        </p>
        <p class="text-center mt-20">
            <a href="index.html">← Back to home</a>
        </p>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);

            try {
                const response = await fetch('api/auth.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...data, action: 'login' })
                });

                const result = await response.json();
                const errorEl = document.getElementById('error-message');

                if (result.success) {
                    localStorage.setItem('user', JSON.stringify(result.user));
                    const redirect = localStorage.getItem('after_login') || 'profile.html';
                    localStorage.removeItem('after_login');
                    window.location.href = redirect;
                } else {
                    errorEl.textContent = result.error || 'Login failed';
                    errorEl.classList.remove('hidden');
                }
            } catch (error) {
                document.getElementById('error-message').textContent = 'Server error. Please try again.';
                document.getElementById('error-message').classList.remove('hidden');
            }
        });

        // Check if user is already logged in
        checkAuth();
    </script>
</body>
</html>
