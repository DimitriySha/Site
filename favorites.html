<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorites - Uyut</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html">Uyut<span>.</span></a>
                </div>
                <nav id="main-nav"></nav>
                <div class="header-actions" id="header-actions"></div>
            </div>
        </div>
    </header>

    <div class="dashboard">
        <div class="container">
            <div class="dashboard-header">
                <h1>Saved Apartments</h1>
                <p>Your collection of favorite properties</p>
            </div>

            <div class="favorites-list" id="favorites-list">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading favorites...
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            initializeAuth();
            loadFavorites();
        });

        async function loadFavorites() {
            try {
                const response = await fetch('api/favorites.php');
                const data = await response.json();

                if (data.success) {
                    renderFavorites(data.favorites);
                } else {
                    showEmptyState();
                }
            } catch (error) {
                showEmptyState();
            }
        }

        function renderFavorites(favorites) {
            const container = document.getElementById('favorites-list');

            if (!favorites.length) {
                showEmptyState();
                return;
            }

            container.innerHTML = favorites.map(apt => `
                <div class="card apartment-card" data-id="${apt.id}">
                    <div class="image-container">
                        <img src="images/apartments/${apt.images[0] || 'placeholder.jpg'}" alt="${apt.title}">
                        <div class="price-tag">₸${Number(apt.price_per_night).toLocaleString()}/night</div>
                    </div>
                    <div class="info">
                        <h3>${apt.title}</h3>
                        <p class="location"><i class="fas fa-map-marker-alt"></i> ${apt.address}</p>
                        <div class="details">
                            <span><i class="fas fa-bed"></i> ${apt.bedrooms} bed</span>
                            <span><i class="fas fa-users"></i> Max ${apt.guests} guests</span>
                        </div>
                        <div class="flex-between mt-20">
                            <a href="apartment.html?id=${apt.id}" class="btn btn-primary btn-sm">View Details</a>
                            <button class="btn btn-danger btn-sm remove-favorite" data-id="${apt.id}">
                                <i class="far fa-trash-alt"></i> Remove
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

            // Add remove handlers
            container.querySelectorAll('.remove-favorite').forEach(btn => {
                btn.addEventListener('click', async function() {
                    if (confirm('Remove this apartment from favorites?')) {
                        try {
                            const response = await fetch('api/favorites.php', {
                                method: 'DELETE',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ apartment_id: this.dataset.id })
                            });

                            const result = await response.json();
                            if (result.success) {
                                this.closest('.apartment-card').remove();
                            } else {
                                alert(result.error || 'Failed to remove');
                            }
                        } catch {
                            alert('Server error');
                        }
                    }
                });
            });

            // Card click handler
            container.querySelectorAll('.apartment-card').forEach(card => {
                card.addEventListener('click', function(e) {
                    if (!e.target.closest('button')) {
                        window.location.href = `apartment.html?id=${this.dataset.id}`;
                    }
                });
            });
        }

        function showEmptyState() {
            document.getElementById('favorites-list').innerHTML = `
                <div class="empty-state">
                    <i class="far fa-heart fa-3x" style="margin-bottom: 15px; color: var(--gray);"></i>
                    <h3>No favorites yet</h3>
                    <p>Save apartments you love by clicking the heart icon on their details page</p>
                    <a href="listings.html" class="btn btn-primary mt-20">Browse Apartments</a>
                </div>
            `;
        }
    </script>
</body>
</html>
