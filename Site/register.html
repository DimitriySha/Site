<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Uyut</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html">Uyut<span>.</span></a>
                </div>
                <nav id="main-nav"></nav>
                <div class="header-actions"></div>
            </div>
        </div>
    </header>

    <div class="auth-form">
        <h2>Create Your Account</h2>
        <div id="error-message" class="error-message hidden"></div>
        <div id="success-message" class="success-message hidden"></div>
        <form id="register-form">
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" required placeholder="John">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" required placeholder="Doe">
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Phone (optional)</label>
                <input type="tel" name="phone" placeholder="+7 (XXX) XXX-XX-XX">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required minlength="6" placeholder="At least 6 characters">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>
        <p class="text-center mt-20">
            Already have an account? <a href="login.html">Login</a>
        </p>
        <p class="text-center mt-20">
            <a href="index.html">← Back to home</a>
        </p>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);

            try {
                const response = await fetch('api/auth.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...data, action: 'register' })
                });

                const result = await response.json();
                const errorEl = document.getElementById('error-message');
                const successEl = document.getElementById('success-message');

                if (result.success) {
                    localStorage.setItem('user', JSON.stringify(result.user));
                    successEl.textContent = 'Registration successful! Redirecting...';
                    successEl.classList.remove('hidden');
                    setTimeout(() => {
                        window.location.href = 'profile.html';
                    }, 1000);
                } else {
                    errorEl.textContent = result.error || 'Registration failed';
                    errorEl.classList.remove('hidden');
                }
            } catch (error) {
                document.getElementById('error-message').textContent = 'Server error. Please try again.';
                document.getElementById('error-message').classList.remove('hidden');
            }
        });

        checkAuth();
    </script>
</body>
</html>
