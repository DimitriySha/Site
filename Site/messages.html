<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Uyut</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html">Uyut<span>.</span></a>
                </div>
                <nav id="main-nav"></nav>
                <div class="header-actions" id="header-actions"></div>
            </div>
        </div>
    </header>

    <div class="dashboard">
        <div class="container">
            <div class="dashboard-header">
                <h1>Messages</h1>
                <p>Communicate with our administrators</p>
            </div>

            <div class="messages-container">
                <!-- List of messages -->
                <div class="messages-list" id="messages-list">
                    <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading messages...</div>
                </div>

                <!-- Message content -->
                <div class="message-content" id="message-content">
                    <div class="empty-state">
                        <i class="far fa-envelope fa-3x" style="margin-bottom: 15px; color: var(--gray);"></i>
                        <h3>Select a message</h3>
                        <p>Choose a conversation from the list to read</p>
                    </div>
                </div>
            </div>

            <!-- New message form -->
            <div class="send-message-form">
                <h3>Send a New Message</h3>
                <form id="new-message-form">
                    <input type="hidden" name="receiver_id" id="receiver-id" value="1">
                    <select name="receiver_id" id="admin-select">
                        <option value="1">Send to Administration</option>
                    </select>
                    <input type="text" name="subject" placeholder="Subject (optional)">
                    <textarea name="message" placeholder="Type your message here..." required></textarea>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i> Send Message
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let currentMessages = [];
        let selectedMessage = null;

        document.addEventListener('DOMContentLoaded', async function() {
            initializeAuth();

            loadMessages();
        });

        async function loadMessages() {
            try {
                const response = await fetch('api/messages.php');
                const data = await response.json();

                if (data.success) {
                    currentMessages = data.messages;
                    renderMessagesList(currentMessages);
                }
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        function renderMessagesList(messages) {
            const list = document.getElementById('messages-list');

            if (!messages.length) {
                list.innerHTML = `
                    <div class="empty-state">
                        <p>No messages yet</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = messages.map(msg => `
                <div class="message-item ${!msg.is_read ? 'unread' : ''}" data-id="${msg.id}">
                    <div>
                        <div class="sender">${msg.sender_id == getCurrentUserId() ? 'You' : 'Admin'}</div>
                        <div class="subject">${msg.subject || 'No subject'}</div>
                        <div class="preview">${msg.message.substring(0, 50)}...</div>
                    </div>
                    <div class="date">${formatDate(msg.created_at)}</div>
                </div>
            `).join('');

            // Add click handlers
            list.querySelectorAll('.message-item').forEach(item => {
                item.addEventListener('click', function() {
                    const msgId = parseInt(this.dataset.id);
                    selectMessage(msgId);
                });
            });
        }

        function selectMessage(msgId) {
            selectedMessage = currentMessages.find(m => m.id === msgId);
            if (!selectedMessage) return;

            const content = document.getElementById('message-content');

            content.innerHTML = `
                <h3 style="margin-bottom: 10px;">${selectedMessage.subject || 'No subject'}</h3>
                <p style="color: var(--gray); margin-bottom: 20px;">
                    From: ${selectedMessage.sender_id == getCurrentUserId() ? 'You' : 'Admin'}
                    <span style="margin-left: 15px;">
                        ${formatDate(selectedMessage.created_at)}
                    </span>
                </p>
                <div style="line-height: 1.8; margin-bottom: 20px;">
                    ${selectedMessage.message.replace(/\n/g, '<br>')}
                </div>
            `;

            // Mark as read
            if (!selectedMessage.is_read && selectedMessage.receiver_id == getCurrentUserId()) {
                markAsRead([msgId]);
            }

            // Highlight selected
            document.querySelectorAll('.message-item').forEach(item => item.classList.remove('selected'));
            document.querySelector(`.message-item[data-id="${msgId}"]`).classList.add('selected');
        }

        async function markAsRead(ids) {
            try {
                await fetch('api/messages.php', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids })
                });
            } catch { }
        }

        // Send new message
        document.getElementById('new-message-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const data = Object.fromEntries(formData);

            if (!data.message.trim()) return;

            try {
                const response = await fetch('api/messages.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        receiver_id: data.receiver_id,
                        subject: data.subject || null,
                        message: data.message
                    })
                });

                const result = await response.json();
                if (result.success) {
                    this.reset();
                    loadMessages();
                    alert('Message sent successfully!');
                } else {
                    alert(result.error || 'Failed to send');
                }
            } catch (error) {
                alert('Server error');
            }
        });

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function getCurrentUserId() {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            return user ? user.id : null;
        }
    </script>
</body>
</html>
