<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - Uyut</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html">Uyut<span>.</span></a>
                </div>
                <nav id="main-nav"></nav>
                <div class="header-actions" id="header-actions"></div>
            </div>
        </div>
    </header>

    <div class="dashboard">
        <div class="container">
            <div class="dashboard-header">
                <h1>My Bookings</h1>
                <p>Manage your reservations</p>
            </div>

            <div class="dashboard-tabs">
                <button class="tab-btn active" data-tab="upcoming">Upcoming</button>
                <button class="tab-btn" data-tab="past">Past</button>
                <button class="tab-btn" data-tab="cancelled">Cancelled</button>
            </div>

            <div id="bookings-content">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading your bookings...
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            initializeAuth();

            // Load all bookings
            try {
                const response = await fetch('api/bookings.php');
                const data = await response.json();

                if (data.success) {
                    renderBookings(data.bookings);
                } else {
                    showError(data.error || 'Failed to load bookings');
                }
            } catch (error) {
                showError('Server error. Please try again.');
            }

            // Tab switching
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    filterBookings(this.dataset.tab);
                });
            });
        });

        function renderBookings(bookings) {
            const container = document.getElementById('bookings-content');

            if (!bookings.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="far fa-calendar-alt fa-3x" style="margin-bottom: 15px; color: var(--gray);"></i>
                        <h3>No bookings yet</h3>
                        <p>Find your perfect apartment and make your first reservation!</p>
                        <a href="listings.html" class="btn btn-primary">Browse Apartments</a>
                    </div>
                `;
                return;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const upcoming = bookings.filter(b => {
                const checkIn = new Date(b.check_in);
                return b.status === 'confirmed' && checkIn >= today;
            });
            const past = bookings.filter(b => {
                const checkOut = new Date(b.check_out);
                return b.status === 'completed' || (b.status === 'confirmed' && checkOut < today);
            });
            const cancelled = bookings.filter(b => b.status === 'cancelled');

            container.innerHTML = `
                <div id="upcoming-tab" class="tab-panel">${renderTable(upcoming)}</div>
                <div id="past-tab" class="tab-panel hidden">${renderTable(past)}</div>
                <div id="cancelled-tab" class="tab-panel hidden">${renderTable(cancelled)}</div>
            `;

            // Add cancel handlers
            container.querySelectorAll('.cancel-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (confirm('Are you sure you want to cancel this booking?')) {
                        cancelBooking(this.dataset.id);
                    }
                });
            });
        }

        function renderTable(bookings) {
            if (!bookings.length) {
                return '<p class="text-center" style="padding: 40px; color: var(--gray);">No bookings in this category</p>';
            }

            return `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Apartment</th>
                            <th>Dates</th>
                            <th>Guests</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${bookings.map(b => `
                            <tr>
                                <td>
                                    <a href="apartment.html?id=${b.apartment_id}">${b.apartment_title}</a>
                                </td>
                                <td>
                                    ${new Date(b.check_in).toLocaleDateString()} - ${new Date(b.check_out).toLocaleDateString()}
                                </td>
                                <td>${b.guests}</td>
                                <td>₸${Number(b.total_price).toLocaleString()}</td>
                                <td><span class="status-badge status-${b.status}">${capitalize(b.status)}</span></td>
                                <td>
                                    ${b.status === 'confirmed' ? `<button class="btn btn-danger btn-sm cancel-btn" data-id="${b.id}">Cancel</button>` : '-'}
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function filterBookings(tab) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.getElementById(tab + '-tab').classList.remove('hidden');
        }

        async function cancelBooking(bookingId) {
            try {
                const response = await fetch('api/bookings.php', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: bookingId })
                });

                const result = await response.json();
                if (result.success) {
                    alert('Booking cancelled');
                    window.location.reload();
                } else {
                    alert(result.error || 'Failed to cancel');
                }
            } catch (error) {
                alert('Server error');
            }
        }

        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function showError(message) {
            document.getElementById('bookings-content').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-triangle fa-3x" style="margin-bottom: 15px; color: var(--danger);"></i>
                    <h3>Error</h3>
                    <p>${message}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
