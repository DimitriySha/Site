<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Uyut</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html">Uyut<span>.</span></a>
                </div>
                <nav id="main-nav"></nav>
                <div class="header-actions" id="header-actions"></div>
            </div>
        </div>
    </header>

    <div class="dashboard">
        <div class="container">
            <div class="dashboard-header">
                <h1>My Profile</h1>
                <p>Manage your personal information</p>
            </div>

            <div class="profile-form">
                <form id="profile-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" name="first_name" id="first-name" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" name="last_name" id="last-name" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" disabled style="background: var(--light);">
                        <small style="color: var(--gray);">Email cannot be changed</small>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" name="phone" id="phone" placeholder="+7 (XXX) XXX-XX-XX">
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                </form>

                <div id="profile-message"></div>
            </div>

            <div class="profile-actions" style="margin-top: 30px;">
                <h3>Account Settings</h3>
                <div style="background: var(--white); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow);">
                    <div class="flex-between">
                        <div>
                            <h4>Change Password</h4>
                            <p style="color: var(--gray); font-size: 0.9rem;">Update your password to keep your account secure</p>
                        </div>
                        <button class="btn btn-secondary" onclick="changePassword()">Change</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('profile-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const data = Object.fromEntries(formData);

            try {
                const response = await fetch('api/auth.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...data, action: 'profile', update: true })
                });

                const result = await response.json();
                const msgEl = document.getElementById('profile-message');

                if (result.success) {
                    msgEl.className = 'success-message';
                    msgEl.textContent = 'Profile updated successfully!';
                    msgEl.classList.remove('hidden');
                    setTimeout(() => {
                        msgEl.classList.add('hidden');
                    }, 3000);
                } else {
                    msgEl.className = 'error-message';
                    msgEl.textContent = result.error || 'Update failed';
                    msgEl.classList.remove('hidden');
                }
            } catch (error) {
                const msgEl = document.getElementById('profile-message');
                msgEl.className = 'error-message';
                msgEl.textContent = 'Server error. Please try again.';
                msgEl.classList.remove('hidden');
            }
        });

        async function changePassword() {
            const oldPass = prompt('Enter current password:');
            if (!oldPass) return;

            const newPass = prompt('Enter new password (min 6 characters):');
            if (!newPass || newPass.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }

            // Note: In a real implementation, you'd add password change endpoint
            alert('Password change feature would be implemented with server-side verification.');
        }

        // Load profile data
        async function loadProfile() {
            try {
                const response = await fetch('api/auth.php');
                const data = await response.json();

                if (data.success) {
                    const user = data.user;
                    document.getElementById('first-name').value = user.first_name;
                    document.getElementById('last-name').value = user.last_name;
                    document.getElementById('email').value = user.email;
                    document.getElementById('phone').value = user.phone || '';
                } else if (data.error === 'Not authenticated') {
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error('Failed to load profile:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            initializeAuth();
            loadProfile();
        });
    </script>
</body>
</html>
